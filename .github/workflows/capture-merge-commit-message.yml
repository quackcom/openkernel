# On PR open/update: if [USE_PR_TITLE] / [USE_PR_DESC] are present, save the intended
# merge commit message, strip flags from the PR title and description, and store until merge.

name: Capture merge commit message

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Run again after auto-renamer adds [Pull Request #N] (avoids racing on open).
  workflow_run:
    workflows: [Assign pull request number]
    types: [completed]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: merge-commit-capture-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request')
    steps:
      - name: Capture flags, store message, clean PR title and body
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let prNumber;
            if (context.eventName === 'workflow_run') {
              const wr = context.payload.workflow_run;
              const prs = wr.pull_requests || [];
              if (prs.length === 0) {
                core.info('workflow_run has no linked PR; skipping.');
                return;
              }
              prNumber = prs[0].number;
            } else {
              prNumber = context.payload.pull_request.number;
            }

            const storeMarker = '<!-- openkernel-merge-commit-store';
            const storeEnd = '-->';

            const stripHtmlComments = (text) =>
              (text || '').replace(/<!--[\s\S]*?-->/g, '');

            const getSummarySection = (body) => {
              const visible = stripHtmlComments(body);
              const match = visible.match(
                /^##\s*Summary\s*\n+([\s\S]*?)(?=\n##\s|\s*$)/im
              );
              return match ? match[1] : '';
            };

            const stripFlags = (text) =>
              (text || '')
                .replace(/\[USE_PR_TITLE\]/gi, '')
                .replace(/\[USE_PR_DESC\]/gi, '');

            const extractSummary = (body) => {
              const section = getSummarySection(body);
              if (!section) return '';
              return stripFlags(section)
                .split('\n')
                .map((line) => line.trimEnd())
                .filter((line) => line.trim().length > 0)
                .join('\n')
                .trim();
            };

            const prTitlePrefixRe = /^\[Pull Request #(\d+)\]\s*/i;

            const stripPrTitlePrefix = (text) =>
              (text || '').replace(prTitlePrefixRe, '').trim();

            const getPrTitlePrefix = (title) => {
              const m = (title || '').match(prTitlePrefixRe);
              return m ? `[Pull Request #${m[1]}] ` : '';
            };

            /* Merge-commit subject only (never includes [Pull Request #N]). */
            const cleanSubject = (raw) =>
              stripPrTitlePrefix(stripFlags(raw)).replace(/\s+/g, ' ').trim();

            /* Subject from title first; if [USE_PR_TITLE] is only in Summary, use first Summary line. */
            const deriveSubject = (title, body) => {
              const fromTitle = cleanSubject(title);
              if (fromTitle) return fromTitle;

              const section = stripFlags(getSummarySection(body));
              const lines = section
                .split('\n')
                .map((line) => line.trim())
                .filter((line) => line.length > 0);

              for (const line of lines) {
                const oneLine = cleanSubject(line);
                if (oneLine) return oneLine;
              }
              return '';
            };

            /* GitHub PR title: always keep existing [Pull Request #N] prefix when present. */
            const buildPrTitle = (originalTitle, innerText) => {
              const prefix = getPrTitlePrefix(originalTitle);
              const inner =
                innerText !== undefined && innerText !== null
                  ? cleanSubject(innerText)
                  : cleanSubject(originalTitle);

              if (prefix) {
                return inner ? `${prefix.trim()} ${inner}` : prefix.trim();
              }

              return (
                stripFlags(originalTitle).replace(/\s+/g, ' ').trim() || inner
              );
            };

            const removeFlagsFromText = (text) =>
              (text || '')
                .replace(/\[USE_PR_TITLE\]/gi, '')
                .replace(/\[USE_PR_DESC\]/gi, '')
                .replace(/[ \t]+$/gm, '')
                .replace(/\n{3,}/g, '\n\n');

            const readStore = (comments) => {
              const c = comments.find(
                (x) => x.body && x.body.includes(storeMarker)
              );
              if (!c) return { commentId: null, data: null };
              const m = c.body.match(
                /<!-- openkernel-merge-commit-store\s*(\{[\s\S]*?\})\s*-->/ 
              );
              if (!m) return { commentId: c.id, data: null };
              try {
                return { commentId: c.id, data: JSON.parse(m[1]) };
              } catch {
                return { commentId: c.id, data: null };
              }
            };

            const writeStoreComment = async (commentId, data, humanBody) => {
              const payload =
                storeMarker +
                '\n' +
                JSON.stringify(data) +
                '\n' +
                storeEnd +
                '\n\n' +
                humanBody;
              if (commentId) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: commentId,
                  body: payload,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: payload,
                });
              }
            };

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const title = pr.title || '';
            const body = pr.body || '';
            const summaryVisible = getSummarySection(body);

            const useTitle =
              /\[USE_PR_TITLE\]/i.test(title) ||
              /\[USE_PR_TITLE\]/i.test(summaryVisible);
            const useDesc = /\[USE_PR_DESC\]/i.test(summaryVisible);

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const { commentId, data: existingStore } = readStore(comments);

            if (!useTitle && !useDesc) {
              if (existingStore) {
                core.info(
                  'No flags on PR; kept existing stored merge message for merge time.'
                );
              } else {
                core.info('No merge-commit flags; nothing to capture.');
              }
              return;
            }

            const subject = useTitle ? deriveSubject(title, body) : null;
            const summaryBody = useDesc ? extractSummary(body) : null;

            const stored = {
              version: 1,
              useTitle: useTitle && !!subject,
              useDesc: useDesc && !!summaryBody,
              subject: subject || null,
              body: summaryBody || null,
              capturedAt: new Date().toISOString(),
            };

            const missing = [];
            if (useTitle && !stored.subject) {
              missing.push(
                '`[USE_PR_TITLE]`: add real text to the PR title or the first line of **Summary** (not the flag alone).'
              );
            }
            if (useDesc && !stored.body) {
              missing.push(
                '`[USE_PR_DESC]`: add text under **Summary** besides the flag (placeholders like "Write your summary here" count).'
              );
            }

            if (!stored.subject && !stored.body) {
              const warn =
                '## Merge commit message (not saved)\n\n' +
                'Flags were **not** removed because nothing usable would be stored:\n\n' +
                missing.map((m) => `- ${m}`).join('\n') +
                '\n\n_Update the PR and push or re-open; this workflow runs again on sync._';
              if (commentId && existingStore) {
                await writeStoreComment(commentId, existingStore, warn);
              } else if (commentId) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: commentId,
                  body: warn,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: warn,
                });
              }
              core.warning(
                'After removing flags, nothing is left to capture: ' + missing.join(' ')
              );
              return;
            }

            let newTitle = title;
            if (stored.useTitle) {
              newTitle = buildPrTitle(title, stored.subject);
            } else if (stored.useDesc) {
              newTitle = buildPrTitle(title, undefined);
            }

            let newBody = body;
            if (stored.useDesc) {
              newBody = removeFlagsFromText(newBody);
            } else if (stored.useTitle) {
              newBody = stripFlags(newBody);
            }

            const updates = {};
            if (newTitle !== title) updates.title = newTitle;
            if (newBody !== body) updates.body = newBody;

            if (Object.keys(updates).length > 0) {
              /* Re-fetch so [Pull Request #N] from assign-pull-request-number is not lost. */
              if (updates.title) {
                const { data: fresh } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber,
                });
                if (stored.useTitle) {
                  updates.title = buildPrTitle(fresh.title, stored.subject);
                } else {
                  updates.title = buildPrTitle(fresh.title, undefined);
                }
              }

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                ...updates,
              });
              core.info('Removed merge-commit flags from PR title/description.');
            }

            let human = '## Merge commit message (saved)\n\n';
            if (missing.length > 0) {
              human +=
                '**Note:** Some flags could not be captured yet:\n\n' +
                missing.map((m) => `- ${m}`).join('\n') +
                '\n\n';
            } else {
              human +=
                'Flags were removed from this PR. On merge, **Sync merge commit** will apply:\n\n';
            }
            if (stored.useTitle && stored.subject) {
              human += `**Subject:** \`${stored.subject}\`\n\n`;
            }
            if (stored.useDesc && stored.body) {
              human += `**Body:**\n\`\`\`\n${stored.body}\n\`\`\`\n\n`;
            }
            human +=
              '_When you click **Merge**, ignore or clear GitHub’s default squash message — the saved text above is what gets written to `main` (if `OPENKERNEL_REPO_PAT` is set or you paste manually)._';

            if (missing.length > 0) {
              core.warning(
                'Partial capture; fix remaining flags: ' + missing.join(' ')
              );
            }

            await writeStoreComment(commentId, stored, human);
            core.info('Stored merge commit message for post-merge sync.');
