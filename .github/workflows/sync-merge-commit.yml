# Verifies merge commit message when [USE_PR_TITLE] / [USE_PR_DESC] are set on the PR.
# The actual merge with custom message is handled by pr-governance.yml at approval time.
# This workflow runs post-merge as a verification/safety net.

name: Sync merge commit

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Merged PR number to verify'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Verify merge commit message
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- sync-merge-commit-status -->';

            const postStatus = async (prNumber, body) => {
              const text = marker + '\n' + body;
              const { data: comments } = await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: prNumber,
              });
              const existing = comments.find(
                (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker)
              );
              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body: text,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: text,
                });
              }
            };

            const stripHtmlComments = (text) =>
              (text || '').replace(/<!--[\s\S]*?-->/g, '');

            const extractSummary = (body) => {
              const visible = stripHtmlComments(body);
              const match = visible.match(
                /^##\s*Summary\s*\n+([\s\S]*?)(?=\n##\s|\s*$)/im
              );
              if (!match) return '';
              return match[1]
                .replace(/\[USE_PR_TITLE\]/gi, '')
                .replace(/\[USE_PR_DESC\]/gi, '')
                .split('\n')
                .map((line) => line.trimEnd())
                .filter((line) => line.trim().length > 0)
                .join('\n')
                .trim();
            };

            const cleanPrTitle = (raw) =>
              (raw || '')
                .replace(/\[USE_PR_TITLE\]/gi, '')
                .replace(/\[USE_PR_DESC\]/gi, '')
                .replace(/^\[Pull Request #\d+\]\s*/i, '')
                .replace(/\s+/g, ' ')
                .trim();

            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = Number(context.payload.inputs.pr_number);
            } else {
              const payloadPr = context.payload.pull_request;
              if (!payloadPr.merged) {
                core.info('PR closed without merge; skipping.');
                return;
              }
              prNumber = payloadPr.number;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            if (!pr.merged) {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n⏭️ Skipped: PR is not merged yet.'
              );
              core.setFailed('PR is not merged.');
              return;
            }

            const title = pr.title || '';
            const body = pr.body || '';
            const summaryVisible = stripHtmlComments(
              (body.match(/^##\s*Summary\s*\n+([\s\S]*?)(?=\n##\s|\s*$)/im) || ['', ''])[1]
            );

            const useTitle =
              /\[USE_PR_TITLE\]/i.test(title) ||
              /\[USE_PR_TITLE\]/i.test(summaryVisible);
            const useDesc = /\[USE_PR_DESC\]/i.test(summaryVisible);

            if (!useTitle && !useDesc) {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n⏭️ Skipped: no `[USE_PR_TITLE]` or `[USE_PR_DESC]` flags found. ' +
                  'The commit message was used as-is from the merge.'
              );
              core.info('No merge-commit flags found.');
              return;
            }

            const cleanTitle = useTitle ? cleanPrTitle(title) : null;
            let cleanDesc = null;
            if (useDesc) {
              cleanDesc = extractSummary(body);
            }

            if (useTitle && !cleanTitle) {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n❌ Failed: `[USE_PR_TITLE]` would produce an empty commit subject.'
              );
              core.setFailed('Empty commit subject.');
              return;
            }

            const mergeSha = pr.merge_commit_sha;
            if (!mergeSha) {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n❌ Failed: no `merge_commit_sha` on this PR.'
              );
              core.setFailed('No merge_commit_sha.');
              return;
            }

            const { data: commit } = await github.rest.git.getCommit({
              owner,
              repo,
              commit_sha: mergeSha,
            });

            const lines = commit.message.split('\n');
            const curTitle = lines[0] || '';
            const curBody = lines.slice(1).join('\n').replace(/^\n+/, '');
            const newTitle = cleanTitle !== null ? cleanTitle : curTitle;
            const newBody = (useDesc && cleanDesc) ? cleanDesc : curBody;
            const expectedMessage = newBody ? `${newTitle}\n\n${newBody}` : newTitle;

            if (commit.message === expectedMessage) {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n✅ Merge commit message already matches PR flags (set by auto-merge in `pr-governance.yml`).'
              );
            } else {
              await postStatus(
                prNumber,
                '## Merge commit sync\n\n⚠️ Flags were set (`[USE_PR_TITLE]` / `[USE_PR_DESC]`) but the merge ' +
                  'commit message does not match the expected value. The PR may have been merged manually.\n\n' +
                  'Expected subject: `' + newTitle + '`\n\n' +
                  'To get the desired message, close a new PR with the flags set and let the governance workflow ' +
                  'handle the merge automatically.'
              );
            }
