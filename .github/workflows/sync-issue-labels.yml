# Ensures issue template labels exist on the repo with exact names from .github/issue-labels.json
# (feature-request, wiki-suggestion, bug). Label names are case-sensitive and must match workflows.

name: Sync issue labels

on:
  push:
    branches: [main]
    paths:
      - '.github/issue-labels.json'
      - '.github/workflows/sync-issue-labels.yml'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create or update labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const specs = JSON.parse(
              fs.readFileSync('.github/issue-labels.json', 'utf8')
            );

            const { data: existing } = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              { owner, repo, per_page: 100 }
            );
            const byName = new Map(existing.map((l) => [l.name, l]));

            for (const spec of specs) {
              const color = (spec.color || 'ededed').replace(/^#/, '');
              const description = spec.description || '';
              const cur = byName.get(spec.name);

              if (!cur) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: spec.name,
                  color,
                  description,
                });
                core.info(`Created label: ${spec.name}`);
                continue;
              }

              if (cur.color !== color || (cur.description || '') !== description) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: spec.name,
                  color,
                  description,
                });
                core.info(`Updated label: ${spec.name}`);
              } else {
                core.info(`Label OK: ${spec.name}`);
              }
            }
