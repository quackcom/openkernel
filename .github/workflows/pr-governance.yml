# PR summary on open/update + collaborator majority approval tracking.
# Adds label `ready-to-merge` when majority of .github/COLLABORATORS approve.

name: PR governance

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-check approvals'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-summary:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            let adds = 0;
            let dels = 0;
            const byArea = {};
            for (const f of files) {
              adds += f.additions;
              dels += f.deletions;
              const area = f.filename.includes('/')
                ? f.filename.split('/')[0] + (f.filename.startsWith('src/') ? '/' + f.filename.split('/')[1] : '')
                : f.filename;
              if (!byArea[area]) byArea[area] = [];
              byArea[area].push(`\`${f.filename}\` (+${f.additions}/-${f.deletions})`);
            }

            let fileList = '';
            for (const [area, items] of Object.entries(byArea)) {
              fileList += `\n**${area}**\n` + items.slice(0, 15).join('\n');
              if (items.length > 15) fileList += `\n_…and ${items.length - 15} more in this area_`;
            }

            const fs = require('fs');
            let collabNote = '';
            let collaborators = [];
            try {
              const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
              collaborators = raw.split('\n')
                .map((l) => l.trim().toLowerCase())
                .filter((l) => l && !l.startsWith('#'));
              const needed = Math.floor(collaborators.length / 2) + 1;
              collabNote = `\n\n### Merge policy\n` +
                `Collaborators: ${collaborators.map((c) => '`' + c + '`').join(', ')}.\n` +
                `Need **${needed}** of ${collaborators.length} (PR author on the list counts as approved). ` +
                `Then \`ready-to-merge\` is applied automatically.\n` +
                `See the **Collaborator approval status** comment for details.`;
            } catch (e) {
              collabNote = '\n\n_Could not read `.github/COLLABORATORS` for majority policy._';
            }

            // --- Code analysis for suggested merge commit ---
            const byCodeDir = {};
            const newCodeFiles = [];
            const delCodeFiles = [];
            const addedSignatures = [];
            const sigRegex = /^(static\s+)?\w+[\s*]+(\w+)\s*\(/m;

            for (const f of files) {
              const top = f.filename.split('/')[0];
              if (!byCodeDir[top]) byCodeDir[top] = [];
              byCodeDir[top].push(f);
              if (f.status === 'added') newCodeFiles.push(f.filename);
              if (f.status === 'removed') delCodeFiles.push(f.filename);

              // Scan patch for new function signatures
              if (f.patch && (f.filename.endsWith('.c') || f.filename.endsWith('.h') || f.filename.endsWith('.asm'))) {
                for (const line of f.patch.split('\n')) {
                  if (line.startsWith('+') && !line.startsWith('+++')) {
                    const cleaned = line.slice(1).trim();
                    const m = cleaned.match(sigRegex);
                    if (m && !['if','for','while','switch','return','else','do','case','sizeof','assert'].includes(m[2])) {
                      addedSignatures.push(m[2]);
                    }
                  }
                }
              }
            }

            const codeDirs = Object.keys(byCodeDir);
            const scopeStr = codeDirs.length === 1 ? codeDirs[0] : codeDirs.slice(0, 3).join(',');

            // Detect change type
            let changeType = 'feat';
            if (codeDirs.length === 1 && (codeDirs[0] === 'docs' || codeDirs[0] === 'wiki')) {
              changeType = 'docs';
            } else if (codeDirs.every((d) => d === '.github' || d === 'build' || d.startsWith('.'))) {
              changeType = 'chore';
            } else if (delCodeFiles.length > 0 && newCodeFiles.length === 0) {
              changeType = 'fix';
            }

            // Build description
            let codeDesc = '';
            if (newCodeFiles.length > 0) {
              codeDesc += `${newCodeFiles.length} new file${newCodeFiles.length > 1 ? 's' : ''}`;
            }
            if (addedSignatures.length > 0) {
              const showSigs = addedSignatures.slice(0, 4).join(', ');
              codeDesc += (codeDesc ? ', add ' : 'add ') +
                addedSignatures.length + ' function' + (addedSignatures.length > 1 ? 's' : '') +
                ' (' + showSigs + (addedSignatures.length > 4 ? ', ...' : '') + ')';
            }
            if (delCodeFiles.length > 0) {
              codeDesc += (codeDesc ? ', remove ' : 'remove ') + delCodeFiles.length + ' file' + (delCodeFiles.length > 1 ? 's' : '');
            }
            if (!codeDesc) {
              const modCount = files.filter((f) => f.status === 'modified').length;
              codeDesc = `update ${modCount} file${modCount > 1 ? 's' : ''}`;
            }

            const suggestedTitle = `${changeType}(${scopeStr}): ${codeDesc}`;

            // Build change summary lines
            const changeLines = [];
            for (const d of codeDirs.sort()) {
              const items = byCodeDir[d];
              const dirAdds = items.reduce((s, f) => s + f.additions, 0);
              const dirDels = items.reduce((s, f) => s + f.deletions, 0);
              const newFiles = items.filter((f) => f.status === 'added');
              const changed = items.filter((f) => f.status === 'modified');
              const parts = [];
              if (newFiles.length > 0) parts.push(`${newFiles.length} added`);
              if (changed.length > 0) parts.push(`${changed.length} modified`);
              const delCount = items.filter((f) => f.status === 'removed').length;
              if (delCount > 0) parts.push(`${delCount} removed`);
              const dirSigs = addedSignatures.filter(() => true); // use the global list
              changeLines.push(`- **${d}**: ${items.length} file(s) (${parts.join(', ')}), +${dirAdds}/-${dirDels}`);
            }

            // Add function-level details if found
            if (addedSignatures.length > 0) {
              changeLines.push('');
              changeLines.push('Functions added/modified:');
              for (const sig of addedSignatures.slice(0, 12)) {
                changeLines.push('  - `' + sig + '`');
              }
              if (addedSignatures.length > 12) {
                changeLines.push('  - ... and ' + (addedSignatures.length - 12) + ' more');
              }
            }

            if (newCodeFiles.length > 0) {
              changeLines.push('');
              changeLines.push('New files:');
              for (const nf of newCodeFiles.slice(0, 8)) {
                changeLines.push('  - `' + nf + '`');
              }
              if (newCodeFiles.length > 8) {
                changeLines.push('  - ... and ' + (newCodeFiles.length - 8) + ' more');
              }
            }

            const codeReview =
              `### Code review summary\n\n` +
              `**Suggested title:** \`${suggestedTitle}\`\n\n` +
              `**Key changes:**\n` +
              changeLines.join('\n') + '\n';

            const body =
              `## PR summary (automated)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Files changed | ${files.length} |\n` +
              `| Lines | +${adds} / -${dels} |\n` +
              `| Author | @${pr.user.login} |\n\n` +
              `### Files by area\n${fileList || '_No files_'}` +
              collabNote +
              `\n\n---\n` +
              codeReview +
              `_Optional: use GitHub Copilot or another AI review tool for deeper code review. ` +
              `Automation does not replace human review for kernel changes._`;

            const marker = '<!-- pr-governance-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: marker + '\n' + body,
              });
            }

  majority-approval:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check collaborator majority
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(
              github.event_name === 'workflow_dispatch'
                ? context.payload.inputs.pr_number
                : context.payload.pull_request.number
            );

            const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
            const collaborators = raw.split('\n')
              .map((l) => l.trim().toLowerCase())
              .filter((l) => l && !l.startsWith('#'));

            if (collaborators.length === 0) {
              core.setFailed('No collaborators listed in .github/COLLABORATORS');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const author = (pr.user.login || '').toLowerCase();

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const latest = new Map();
            for (const r of reviews) {
              if (r.user && r.user.login) {
                latest.set(r.user.login.toLowerCase(), r.state);
              }
            }

            const required = Math.floor(collaborators.length / 2) + 1;

            // Listed PR author counts as approved (GitHub does not allow self-Approve on own PRs).
            const approvedSet = new Set();
            const authorIsCollaborator = collaborators.includes(author);
            if (authorIsCollaborator) {
              approvedSet.add(author);
            }
            for (const login of collaborators) {
              if (latest.get(login) === 'APPROVED') approvedSet.add(login);
            }
            const approved = [...approvedSet];
            const majorityMet = approved.length >= required;

            const ruleNote =
              authorIsCollaborator
                ? `The PR author @${pr.user.login} is in \`.github/COLLABORATORS\` and **counts as approved** automatically.\n\n`
                : '';

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: '0e8a16',
                  description: 'Collaborator majority approval met',
                });
                core.info(`Created missing label: ${name}`);
              }
            }

            const howToApprove =
              `### How to approve\n\n` +
              `Only users in [\`.github/COLLABORATORS\`](https://github.com/${owner}/${repo}/blob/main/.github/COLLABORATORS) count. ` +
              `The **PR author** counts as approved if they are on that list (no self-Approve button on GitHub).\n\n` +
              `1. Open the PR on GitHub.\n` +
              `2. Go to **Files changed** (or use the review bar on **Conversation**).\n` +
              `3. Click **Review changes** (green button, top right).\n` +
              `4. Select **Approve** (not *Comment* only — comments do not count).\n` +
              `5. Click **Submit review**.\n\n` +
              `Alternatively: sidebar **Reviewers** → your avatar → **Approve**.\n\n` +
              `When enough listed collaborators have approved, this bot adds \`ready-to-merge\`. ` +
              `A collaborator then clicks **Merge pull request** (squash or merge per repo preference).\n\n`;

            let body =
              `## Collaborator approval status\n\n` +
              ruleNote +
              howToApprove +
              `| | Count |\n|--|------|\n` +
              `| Required | **${required}** |\n` +
              `| Approved (listed collaborators) | **${approved.length}** of ${collaborators.length} |\n\n`;

            if (approved.length > 0) {
              const approvedLabels = approved.map((login) => {
                if (login === author && authorIsCollaborator) {
                  return `\`${login}\` (author, counted automatically)`;
                }
                return `\`${login}\``;
              });
              body += `Counted as approved: ${approvedLabels.join(', ')}\n\n`;
            }

            const pending = collaborators.filter((c) => !approved.includes(c));
            if (pending.length > 0) {
              body += `Not yet approved: ${pending.map((p) => '`' + p + '`').join(', ')}\n\n`;
            }

            if (majorityMet) {
              body += '✅ **Ready to merge.** Label `ready-to-merge` applied. A collaborator may merge when CI and review quality are satisfactory.\n';
            } else {
              body += `⏳ **Waiting for collaborator majority** (${approved.length}/${required}).\n`;
            }

            const marker = '<!-- pr-governance-approval -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: marker + '\n' + body,
              });
            }

            if (majorityMet) {
              await ensureLabel('ready-to-merge');
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['ready-to-merge'],
                });
                core.info('Applied label ready-to-merge');
              } catch (e) {
                core.setFailed(`Could not add ready-to-merge label: ${e.message}`);
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'ready-to-merge',
                });
              } catch (e) {
                core.info('ready-to-merge label not present');
              }
            }
