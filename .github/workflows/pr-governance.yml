# PR summary on open/update + collaborator majority approval tracking.
# Adds label `ready-to-merge` when majority of .github/COLLABORATORS approve.

name: PR governance

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to re-check approvals'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-summary:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post PR summary
        uses: actions/github-script@v7
        env:
          NVIDIA_NIM_KEY: ${{ secrets.NVIDIA_NIM_KEY }}
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            let adds = 0;
            let dels = 0;
            const byArea = {};
            for (const f of files) {
              adds += f.additions;
              dels += f.deletions;
              const area = f.filename.includes('/')
                ? f.filename.split('/')[0] + (f.filename.startsWith('src/') ? '/' + f.filename.split('/')[1] : '')
                : f.filename;
              if (!byArea[area]) byArea[area] = [];
              byArea[area].push(`\`${f.filename}\` (+${f.additions}/-${f.deletions})`);
            }

            let fileList = '';
            for (const [area, items] of Object.entries(byArea)) {
              fileList += `\n**${area}**\n` + items.slice(0, 15).join('\n');
              if (items.length > 15) fileList += `\n_…and ${items.length - 15} more in this area_`;
            }

            const fs = require('fs');
            let collabNote = '';
            let collaborators = [];
            try {
              const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
              collaborators = raw.split('\n')
                .map((l) => l.trim().toLowerCase())
                .filter((l) => l && !l.startsWith('#'));
              const needed = Math.floor(collaborators.length / 2) + 1;
              collabNote = `\n\n### Merge policy\n` +
                `Collaborators: ${collaborators.map((c) => '`' + c + '`').join(', ')}.\n` +
                `Need **${needed}** of ${collaborators.length} (PR author on the list counts as approved). ` +
                `Then \`ready-to-merge\` is applied automatically.\n` +
                `See the **Collaborator approval status** comment for details.`;
            } catch (e) {
              collabNote = '\n\n_Could not read `.github/COLLABORATORS` for majority policy._';
            }

            let mergeFlagPreview = '';
            const { data: prComments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });
            const storeComment = prComments.find(
              (c) => c.body && c.body.includes('<!-- openkernel-merge-commit-store')
            );
            if (storeComment) {
              const m = storeComment.body.match(
                /<!-- openkernel-merge-commit-store\s*(\{[\s\S]*?\})\s*-->/
              );
              if (m) {
                try {
                  const stored = JSON.parse(m[1]);
                  if (stored.useTitle || stored.useDesc) {
                    mergeFlagPreview =
                      '\n\n### Saved merge commit (flags already removed from this PR)\n\n';
                    if (stored.useTitle && stored.subject) {
                      mergeFlagPreview += `**Subject:** \`${stored.subject}\`\n\n`;
                    }
                    if (stored.useDesc && stored.body) {
                      mergeFlagPreview +=
                        `**Body:**\n\`\`\`\n${stored.body}\n\`\`\`\n\n`;
                    }
                    mergeFlagPreview +=
                      'Applied on merge by **Sync merge commit** (needs `OPENKERNEL_REPO_PAT` on protected `main`). ' +
                      'You can ignore GitHub’s default squash message when merging.\n';
                  }
                } catch (e) {
                  core.info(`Could not parse merge store JSON: ${e.message}`);
                }
              }
            }

            // AI-generated merge commit suggestion via NVIDIA NIM
            let aiSuggestion = '';
            const nimKey = process.env.NVIDIA_NIM_KEY;
            if (nimKey) {
              try {
                const baseRef = pr.base.ref;
                const headSha = pr.head.sha;
                const { data: compare } = await github.rest.repos.compareCommits({
                  owner,
                  repo,
                  base: baseRef,
                  head: headSha,
                });

                const diffText = (compare.files || [])
                  .map((f) => `--- ${f.filename}\n+++ ${f.filename}\n` + (f.patch || ''))
                  .join('\n')
                  .slice(0, 12000);

                if (diffText) {
                  const response = await fetch(
                    'https://integrate.api.nvidia.com/v1/chat/completions',
                    {
                      method: 'POST',
                      headers: {
                        'Authorization': `Bearer ${nimKey}`,
                        'Content-Type': 'application/json',
                      },
                      body: JSON.stringify({
                        model: 'nvidia/llama-3.1-nemotron-70b-instruct',
                        messages: [
                          {
                            role: 'system',
                            content: 'You are a merge commit message generator. ' +
                              'Given a git diff, write a concise merge commit title (one line, no backticks) ' +
                              'and a description (bullet points of key changes). ' +
                              'Reply ONLY with:\n\n' +
                              'TITLE: <title>\nBODY:\n<description>',
                          },
                          {
                            role: 'user',
                            content: `Generate a merge commit message for this diff:\n\n${diffText}`,
                          },
                        ],
                        max_tokens: 500,
                        temperature: 0.3,
                      }),
                    }
                  );

                  if (response.ok) {
                    const data = await response.json();
                    const reply = data.choices?.[0]?.message?.content || '';
                    const titleMatch = reply.match(/^TITLE:\s*(.+)/im);
                    const bodyMatch = reply.match(/^BODY:\n([\s\S]*)/im);
                    const aiTitle = titleMatch ? titleMatch[1].trim() : '';
                    const aiBody = bodyMatch ? bodyMatch[1].trim() : '';

                    if (aiTitle) {
                      aiSuggestion = `\n\n### Suggested merge commit (AI)\n\n` +
                        `**Title:**\n\`${aiTitle}\`\n\n`;
                      if (aiBody) {
                        aiSuggestion +=
                          `**Body:**\n\`\`\`\n${aiBody}\n\`\`\`\n`;
                      }
                    }
                  } else {
                    core.info(`NIM API returned ${response.status}`);
                  }
                }
              } catch (e) {
                core.info(`NIM suggestion failed: ${e.message}`);
              }
            }

            const body =
              `## PR summary (automated)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Files changed | ${files.length} |\n` +
              `| Lines | +${adds} / -${dels} |\n` +
              `| Author | @${pr.user.login} |\n\n` +
              `### Files by area\n${fileList || '_No files_'}` +
              collabNote +
              mergeFlagPreview +
              `\n\n---\n` +
              aiSuggestion +
              `_Optional: use GitHub Copilot or another AI review tool for deeper code review. ` +
              `Automation does not replace human review for kernel changes._`;

            const marker = '<!-- pr-governance-summary -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: marker + '\n' + body,
              });
            }

  majority-approval:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request_review' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check collaborator majority
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = Number(
              github.event_name === 'workflow_dispatch'
                ? context.payload.inputs.pr_number
                : context.payload.pull_request.number
            );

            const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
            const collaborators = raw.split('\n')
              .map((l) => l.trim().toLowerCase())
              .filter((l) => l && !l.startsWith('#'));

            if (collaborators.length === 0) {
              core.setFailed('No collaborators listed in .github/COLLABORATORS');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });
            const author = (pr.user.login || '').toLowerCase();

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const latest = new Map();
            for (const r of reviews) {
              if (r.user && r.user.login) {
                latest.set(r.user.login.toLowerCase(), r.state);
              }
            }

            const required = Math.floor(collaborators.length / 2) + 1;

            // Listed PR author counts as approved (GitHub does not allow self-Approve on own PRs).
            const approvedSet = new Set();
            const authorIsCollaborator = collaborators.includes(author);
            if (authorIsCollaborator) {
              approvedSet.add(author);
            }
            for (const login of collaborators) {
              if (latest.get(login) === 'APPROVED') approvedSet.add(login);
            }
            const approved = [...approvedSet];
            const majorityMet = approved.length >= required;

            const ruleNote =
              authorIsCollaborator
                ? `The PR author @${pr.user.login} is in \`.github/COLLABORATORS\` and **counts as approved** automatically.\n\n`
                : '';

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color: '0e8a16',
                  description: 'Collaborator majority approval met',
                });
                core.info(`Created missing label: ${name}`);
              }
            }

            const howToApprove =
              `### How to approve\n\n` +
              `Only users in [\`.github/COLLABORATORS\`](https://github.com/${owner}/${repo}/blob/main/.github/COLLABORATORS) count. ` +
              `The **PR author** counts as approved if they are on that list (no self-Approve button on GitHub).\n\n` +
              `1. Open the PR on GitHub.\n` +
              `2. Go to **Files changed** (or use the review bar on **Conversation**).\n` +
              `3. Click **Review changes** (green button, top right).\n` +
              `4. Select **Approve** (not *Comment* only — comments do not count).\n` +
              `5. Click **Submit review**.\n\n` +
              `Alternatively: sidebar **Reviewers** → your avatar → **Approve**.\n\n` +
              `When enough listed collaborators have approved, this bot adds \`ready-to-merge\`. ` +
              `A collaborator then clicks **Merge pull request** (squash or merge per repo preference).\n\n`;

            let body =
              `## Collaborator approval status\n\n` +
              ruleNote +
              howToApprove +
              `| | Count |\n|--|------|\n` +
              `| Required | **${required}** |\n` +
              `| Approved (listed collaborators) | **${approved.length}** of ${collaborators.length} |\n\n`;

            if (approved.length > 0) {
              const approvedLabels = approved.map((login) => {
                if (login === author && authorIsCollaborator) {
                  return `\`${login}\` (author, counted automatically)`;
                }
                return `\`${login}\``;
              });
              body += `Counted as approved: ${approvedLabels.join(', ')}\n\n`;
            }

            const pending = collaborators.filter((c) => !approved.includes(c));
            if (pending.length > 0) {
              body += `Not yet approved: ${pending.map((p) => '`' + p + '`').join(', ')}\n\n`;
            }

            if (majorityMet) {
              body += '✅ **Ready to merge.** Label `ready-to-merge` applied. A collaborator may merge when CI and review quality are satisfactory.\n';
            } else {
              body += `⏳ **Waiting for collaborator majority** (${approved.length}/${required}).\n`;
            }

            const marker = '<!-- pr-governance-approval -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: marker + '\n' + body,
              });
            }

            if (majorityMet) {
              await ensureLabel('ready-to-merge');
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: ['ready-to-merge'],
                });
                core.info('Applied label ready-to-merge');
              } catch (e) {
                core.setFailed(`Could not add ready-to-merge label: ${e.message}`);
              }
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'ready-to-merge',
                });
              } catch (e) {
                core.info('ready-to-merge label not present');
              }
            }
