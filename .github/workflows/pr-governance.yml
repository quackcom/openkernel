# PR summary on open/update + collaborator majority approval tracking.
# Does NOT auto-merge. Adds label `ready-to-merge` when majority of
# .github/COLLABORATORS have approved.

name: PR governance

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  pr-summary:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post PR summary
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: pr.number, per_page: 100 }
            );

            let adds = 0;
            let dels = 0;
            const byArea = {};
            for (const f of files) {
              adds += f.additions;
              dels += f.deletions;
              const area = f.filename.includes('/')
                ? f.filename.split('/')[0] + (f.filename.startsWith('src/') ? '/' + f.filename.split('/')[1] : '')
                : f.filename;
              if (!byArea[area]) byArea[area] = [];
              byArea[area].push(`\`${f.filename}\` (+${f.additions}/-${f.deletions})`);
            }

            let fileList = '';
            for (const [area, items] of Object.entries(byArea)) {
              fileList += `\n**${area}**\n` + items.slice(0, 15).join('\n');
              if (items.length > 15) fileList += `\n_…and ${items.length - 15} more in this area_`;
            }

            const fs = require('fs');
            let collabNote = '';
            try {
              const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
              const collabs = raw.split('\n')
                .map((l) => l.trim())
                .filter((l) => l && !l.startsWith('#'));
              const needed = Math.floor(collabs.length / 2) + 1;
              collabNote = `\n\n### Merge policy\n` +
                `Collaborator majority required: **${needed}** of **${collabs.length}** approvals ` +
                `from: ${collabs.map((c) => '`' + c + '`').join(', ')}.\n` +
                `When reached, this workflow adds the \`ready-to-merge\` label (merge is still manual).`;
            } catch (e) {
              collabNote = '\n\n_Could not read `.github/COLLABORATORS` for majority policy._';
            }

            const body =
              `## PR summary (automated)\n\n` +
              `| Metric | Value |\n|--------|-------|\n` +
              `| Files changed | ${files.length} |\n` +
              `| Lines | +${adds} / -${dels} |\n` +
              `| Author | @${pr.user.login} |\n\n` +
              `### Files by area\n${fileList || '_No files_'}` +
              collabNote +
              `\n\n---\n` +
              `_Optional: use GitHub Copilot or another AI review tool for deeper code review. ` +
              `Automation does not replace human review for kernel changes._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
            });
            const marker = '<!-- pr-governance-summary -->';
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: marker + '\n' + body,
              });
            }

  majority-approval:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check collaborator majority
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            const raw = fs.readFileSync('.github/COLLABORATORS', 'utf8');
            const collaborators = raw.split('\n')
              .map((l) => l.trim().toLowerCase())
              .filter((l) => l && !l.startsWith('#'));

            if (collaborators.length === 0) {
              core.setFailed('No collaborators listed in .github/COLLABORATORS');
              return;
            }

            const required = Math.floor(collaborators.length / 2) + 1;

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            // Latest review per user wins
            const latest = new Map();
            for (const r of reviews) {
              if (r.user && r.user.login) {
                latest.set(r.user.login.toLowerCase(), r.state);
              }
            }

            const approved = [];
            for (const login of collaborators) {
              if (latest.get(login) === 'APPROVED') approved.push(login);
            }

            const majorityMet = approved.length >= required;

            let body =
              `## Collaborator approval status\n\n` +
              `| | Count |\n|--|------|\n` +
              `| Required (majority) | **${required}** of ${collaborators.length} |\n` +
              `| Approved | **${approved.length}** |\n\n`;

            if (approved.length > 0) {
              body += `Approved: ${approved.map((a) => '`' + a + '`').join(', ')}\n\n`;
            }

            const pending = collaborators.filter((c) => !approved.includes(c));
            if (pending.length > 0) {
              body += `Not yet approved: ${pending.map((p) => '`' + p + '`').join(', ')}\n\n`;
            }

            if (majorityMet) {
              body += '✅ **Collaborator majority reached.** Label `ready-to-merge` applied. A collaborator may merge when CI and review quality are satisfactory.\n';
            } else {
              body += `⏳ **Waiting for collaborator majority** (${approved.length}/${required}).\n`;
            }

            const marker = '<!-- pr-governance-approval -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: marker + '\n' + body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: marker + '\n' + body,
              });
            }

            if (majorityMet) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels: ['ready-to-merge'],
              });
            } else {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: prNumber,
                  name: 'ready-to-merge',
                });
              } catch (e) {
                core.info('ready-to-merge label not present');
              }
            }
