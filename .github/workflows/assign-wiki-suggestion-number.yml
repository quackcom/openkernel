# Assigns [Wiki Suggestion #N] to issue titles for every issue labeled "wiki-suggestion".
# Uses a concurrency queue so numbering runs one at a time when many arrive together.

name: Assign wiki suggestion number

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

concurrency:
  group: wiki-suggestion-number-queue
  cancel-in-progress: false

jobs:
  assign-wiki-suggestion-number:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issues' && (
        contains(github.event.issue.labels.*.name, 'wiki-suggestion') ||
        (github.event.action == 'labeled' && github.event.label.name == 'wiki-suggestion')
      )
    steps:
      - name: Assign sequential [Wiki Suggestion #N] title
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;
            const label = 'wiki-suggestion';
            const titlePrefix = '[Wiki Suggestion #';
            const titleRegex = /^\[Wiki Suggestion #(\d+)\]\s*/i;
            const templatePrefix = /^\[Wiki Suggestion\]\s*/i;

            const { data: issue } = await github.rest.issues.get({
              owner,
              repo,
              issue_number: issueNumber,
            });

            if (!issue.labels.some((l) => l.name === label)) {
              core.info(`Issue does not have the ${label} label; skipping.`);
              return;
            }

            if (titleRegex.test(issue.title)) {
              core.info('Issue already has a wiki suggestion number in the title.');
              return;
            }

            const labeledIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: label,
              state: 'all',
              per_page: 100,
            });

            let maxNum = 0;
            for (const item of labeledIssues) {
              const match = item.title.match(titleRegex);
              if (match) {
                const n = parseInt(match[1], 10);
                if (n > maxNum) maxNum = n;
              }
            }

            const nextNum = maxNum + 1;
            const baseTitle = issue.title.replace(templatePrefix, '').trim();
            const newTitle = `${titlePrefix}${nextNum}] ${baseTitle}`;

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              title: newTitle,
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body:
                `Tracked as **Wiki Suggestion #${nextNum}** (assigned sequentially via the wiki-suggestion-number queue).`,
            });
